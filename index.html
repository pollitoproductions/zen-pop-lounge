<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
<style>
  body { 
    margin: 0; padding: 0; 
    background-color: #1a1a1a; 
    overflow: hidden; 
    font-family: 'Segoe UI', sans-serif;
    touch-action: none; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  canvas { display: block; }

  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
  }

  .hud-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    width: 100%;
  }
  
  .stat-box { 
    text-align: center; 
    pointer-events: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 1px 2px black; }
  .value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 5px; text-shadow: 0 2px 4px black; }

  .icon-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.15); 
    border: 2px solid rgba(0, 0, 0, 0.6); 
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    margin-top: 5px;
    cursor: pointer;
    display: flex; 
    justify-content: center; align-items: center;
    backdrop-filter: blur(2px);
    transition: transform 0.1s, background 0.2s;
    outline: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  
  .icon-btn svg { width: 24px; height: 24px; fill: #fff; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
  .icon-btn:hover { background: rgba(255,255,255,0.3); }
  .icon-btn:active { transform: scale(0.90); }

  @media (max-height: 500px) and (orientation: landscape) {
    .hud-top { padding: 0 20px; top: 10px; }
    .stat-box { align-items: flex-start; }
    .stat-box:last-child { align-items: flex-end; }
    .value { font-size: 20px; }
    .icon-btn { width: 30px; height: 30px; margin-top: 5px; }
    .icon-btn svg { width: 18px; height: 18px; }
  }

  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center;
    pointer-events: auto;
    z-index: 100;
    transition: opacity 0.3s;
    text-align: center;
  }
  
  #overlay h2 { 
    color: #fff; 
    font-family: 'Limelight', cursive;
    font-size: 64px;
    letter-spacing: 2px;
    margin: 0 0 10px 0; 
    text-shadow: 0 0 15px rgba(255, 75, 43, 0.6);
  }
  
  #overlay p { color: #ccc; font-size: 18px; margin: 0 0 30px 0; max-width: 80%; line-height: 1.4; padding: 0 20px; }
  
  .btn {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white; border: none;
    padding: 15px 40px; font-size: 20px;
    border-radius: 50px; font-weight: bold;
    box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
    cursor: pointer; transition: transform 0.1s;
    outline: none;
    font-family: 'Segoe UI', sans-serif;
  }
  .btn:active { transform: scale(0.95); }
  
  .copyright {
    position: absolute; bottom: 20px;
    color: #666; font-size: 12px; font-weight: 400; letter-spacing: 0.5px;
  }

  #reset-btn { 
    display: none; 
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: bold;
    align-self: center;
    cursor: pointer;
    margin-bottom: 20px;
    backdrop-filter: blur(4px);
  }
  #reset-btn:active { background: rgba(255, 255, 255, 0.4); }

  #theme-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #theme-modal.open { display: flex; }

  .theme-modal-content {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    width: min(92vw, 480px);
    max-width: min(92vw, 480px);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .theme-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .theme-modal-header h3 {
    color: #fff;
    font-family: 'Limelight', cursive;
    font-size: 22px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255, 75, 43, 0.6);
  }

  #close-theme-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    line-height: 1;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #close-theme-btn:hover { background: rgba(255,75,43,0.5); }
  #close-theme-btn:active { transform: scale(0.92); }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px;
    overflow-y: auto;
    flex: 1;
  }

  .theme-card {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 7px 6px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 0;
    overflow: hidden;
  }

  .theme-card:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.35);
    transform: translateY(-2px);
  }

  .theme-card.active {
    border-color: #ff4b2b;
    background: rgba(255, 75, 43, 0.18);
    box-shadow: 0 0 10px rgba(255, 75, 43, 0.4);
  }

  .theme-card h4 {
    color: #fff;
    margin: 0 0 3px 0;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .theme-card p {
    display: none;
  }

  .theme-card p.selected-label {
    color: #ff4b2b;
    font-weight: bold;
    margin-top: 3px;
  }

  .theme-preview {
    width: 100%;
    height: 40px;
    border-radius: 6px;
    margin-bottom: 6px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  #menu-confirm {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #menu-confirm-box {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    min-width: 220px;
  }

  #menu-confirm-box p {
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    margin: 0 0 20px 0;
  }

  #menu-confirm-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  #menu-confirm-yes {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #menu-confirm-yes:active { transform: scale(0.95); }

  #menu-confirm-no {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #menu-confirm-no:active { transform: scale(0.95); }

</style>
</head>
<body>

<div id="overlay">
  <h2 id="overlay-title">Zen Pop Lounge</h2>
  <p id="overlay-msg">Drag and release anywhere to throw.</p>
  <button class="btn" id="main-btn">TAP TO PLAY</button>
  <button class="btn" id="theme-btn" style="background: linear-gradient(135deg, #667eea, #764ba2); margin-top: 15px;">CHANGE THEME</button>
  <div class="copyright">&copy; Pollito Productions 2026</div>
</div>

<div id="menu-confirm" style="display:none;">
  <div id="menu-confirm-box">
    <p>Go to main menu?</p>
    <div id="menu-confirm-btns">
      <button id="menu-confirm-yes">Main Menu</button>

<div id="theme-modal">
  <div class="theme-modal-content">
    <div class="theme-modal-header">

      <button id="close-theme-btn">&#x2715;</button>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
  </div>
</div>

<div id="ui">
  <div class="hud-top">
    <div class="stat-box">
      <div class="label">Popped</div>
      <div class="value" id="popped">0</div>
      <button class="icon-btn" id="ingame-restart" title="Restart">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="icon-btn" id="ingame-mute" title="Mute Music">
        <svg id="mute-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <button class="icon-btn" id="ingame-menu" title="Main Menu">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.01 7.01 0 00-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>

  </div>
  <button id="reset-btn">TRY AGAIN</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- AUDIO SYSTEM ---
const Sound = {
  ctx: null,
  masterGain: null,
  muted: false,
  musicInterval: null,
  
  init: function() {
    window.AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!this.ctx) {
      this.ctx = new AudioContext();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 1.0;
      this.masterGain.connect(this.ctx.destination);
    }
    if(this.ctx.state === 'suspended') this.ctx.resume();
  },
  
  killAudio: function() {
    if(this.masterGain) {
        this.masterGain.gain.cancelScheduledValues(0);
        this.masterGain.gain.value = 0;
    }
    if(this.ctx) this.ctx.suspend();
    this.stopMusic();
  },

  resumeAudio: function() {
    if(this.ctx) {
        this.ctx.resume();
        if(this.masterGain) this.masterGain.gain.value = 1.0;
    }
    if(!this.muted) this.startLoungeMusic();
  },

  toggleMute: function() {
    this.muted = !this.muted;
    if(this.muted) this.stopMusic();
    else this.startLoungeMusic();
    return this.muted;
  },

  pop: function() {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(t + 0.15);
  },
  
  throw: function() {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.linearRampToValueAtTime(300, t + 0.2);
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.1);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.3);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(t + 0.3);
  },
  
  win: function() {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.setValueAtTime(600, t + 0.1);
    osc.frequency.setValueAtTime(800, t + 0.2);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.5);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(t + 0.5);
  },

  playChord: function(freqs, duration) {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    freqs.forEach((f, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f + (Math.random() * 2 - 1); 
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.08 - (i*0.01), t + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(t + duration + 0.1);
    });
  },

  playBrownNoise: function() {
    if (!this.ctx || this.muted) return;
    this.stopBrownNoise();
    const bufferSize = this.ctx.sampleRate * 4;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5;
    }
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    const gainNode = this.ctx.createGain();
    gainNode.gain.value = 0.12;
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(this.masterGain);
    source.start();
    this.brownNoiseSource = source;
  },

  stopBrownNoise: function() {
    if (this.brownNoiseSource) {
      try { this.brownNoiseSource.stop(); } catch(e) {}
      this.brownNoiseSource = null;
    }
  },

  getThemeMusic: function() {
    const theme = currentTheme;
    const musicMap = {
      default:        [[293.66,349.23,415.30,523.25],[196.00,349.23,415.30,493.88],[261.63,329.63,392.00,493.88],[220.00,277.18,349.23,415.30]],
      sakura:         [[329.63,392.00,493.88,587.33],[293.66,349.23,440.00,523.25],[349.23,415.30,523.25,659.25],[329.63,392.00,493.88,587.33]],
      aquarium:       [[130.81,164.81,196.00,246.94],[146.83,174.61,220.00,277.18],[164.81,196.00,246.94,329.63],[146.83,174.61,220.00,277.18]],
      midnight:       [[138.59,184.99,246.94,329.63],[164.81,220.00,293.33,392.00],[174.61,233.08,311.13,415.30],[164.81,220.00,293.33,392.00]],
      cafe:           [[87.31,110.00,130.81,164.81],[98.00,123.47,146.83,196.00],[110.00,130.81,164.81,196.00],[123.47,146.83,196.00,246.94]],
      cosmic:         [[246.94,329.63,415.30,523.25],[196.00,261.63,329.63,415.30],[293.66,392.00,493.88,587.33],[349.23,466.16,587.33,698.46]],
      autumn:         [[110.00,146.83,196.00,246.94],[123.47,164.81,220.00,293.66],[130.81,174.61,233.08,311.13],[146.83,196.00,261.63,349.23]],
      glacial:        [[261.63,329.63,392.00,523.25],[293.66,369.99,440.00,587.33],[329.63,415.30,493.88,659.25],[293.66,369.99,440.00,587.33]],
      minimalist:     [[110.00,220.00,330.00,440.00],[110.00,220.00,330.00,440.00],[110.00,220.00,330.00,440.00],[110.00,220.00,330.00,440.00]],
      velvet:         [[87.31,116.54,155.56,207.65],[73.42,87.31,110.00,146.83],[82.41,110.00,138.59,184.99],[77.78,103.83,130.81,164.81]],
      origami:        [[392.00,493.88,622.25,739.99],[349.23,440.00,554.37,659.25],[415.30,523.25,659.25,783.99],[392.00,493.88,622.25,739.99]],
      matcha:         [[146.83,174.61,220.00,261.63],[164.81,196.00,246.94,293.66],[130.81,164.81,196.00,246.94],[110.00,146.83,174.61,220.00]],
      neonsynth:      [[277.18,369.99,493.88,659.25],[311.13,415.30,554.37,739.99],[329.63,440.00,587.33,783.99],[311.13,415.30,554.37,739.99]],
      honeycomb:      [[87.31,116.54,138.59,185.00],[73.42,98.00,123.47,164.81],[82.41,110.00,130.81,174.61],[87.31,116.54,138.59,185.00]],
      cloud:          [[523.25,659.25,783.99,987.77],[587.33,739.99,880.00,1108.73],[493.88,622.25,783.99,987.77],[523.25,659.25,783.99,987.77]],
      crystal_cavern: [[155.56,196.00,246.94,311.13],[138.59,174.61,220.00,277.18],[164.81,207.65,261.63,329.63],[155.56,196.00,246.94,311.13]],
      clockwork:      [[220.00,293.66,369.99,440.00],[196.00,261.63,329.63,392.00],[207.65,277.18,349.23,415.30],[220.00,293.66,369.99,440.00]],
      beach:          [[174.61,220.00,261.63,329.63],[164.81,207.65,246.94,311.13],[184.99,233.08,277.18,349.23],[174.61,220.00,261.63,329.63]]
    };
    return musicMap[theme] || musicMap.default;
  },
  
  startLoungeMusic: function() {
    if(this.musicInterval) clearInterval(this.musicInterval);
    this.stopBrownNoise();
    if(this.muted) return;
    // Riverstone uses brown noise instead of chord music
    if (currentTheme === 'riverstone') {
      this.playBrownNoise();
      return;
    }
    let step = 0;
    const progression = this.getThemeMusic();
    const playStep = () => {
        if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
        this.playChord(progression[step % 4], 2.5);
        step++;
    };
    playStep();
    this.musicInterval = setInterval(playStep, 2500);
  },
  
  stopMusic: function() {
    if(this.musicInterval) clearInterval(this.musicInterval);
    this.musicInterval = null;
    this.stopBrownNoise();
  }
};

// --- CONFIG ---
const CONFIG = {
  gravity: 0.25,
  drag: 0.992,
  forceMulti: 0.55,
  maxSpeed: 45,
  balloonSpeed: 1.5
};

// --- THEMES ---
const THEMES = {
  default: {
    name: 'Default',
    vibe: 'Classic zen experience',
    previewGradient: 'linear-gradient(135deg, #2c3e50, #000000)',
    bgGradient: (ctx, w, h) => {

function initThemeSelector() {
  const html = Object.entries(THEMES).map(([key, theme]) => {
    const isActive = key === currentTheme;
    return `
      <div class="theme-card${isActive ? ' active' : ''}" data-theme="${key}">
        <div class="theme-preview" id="preview-${key}"></div>
        <h4>${theme.name}</h4>
        <p>${theme.vibe}</p>
        ${isActive ? '<p class="selected-label">&#x2713; Selected</p>' : ''}
      </div>
    `;
  }).join('');
  themeGrid.innerHTML = html;
  
  // Draw balloon previews for each theme
  Object.keys(THEMES).forEach(themeName => {
    drawThemeBalloonPreview(themeName);
  });
}

function drawThemeBalloonPreview(themeName) {
  const theme = THEMES[themeName];
  const previewEl = document.getElementById(`preview-${themeName}`);
  if (!previewEl) return;
  
  const canvas = document.createElement('canvas');
  canvas.width = 280;
  canvas.height = 60;
  const ctx = canvas.getContext('2d');
  
  // Draw background
  const bgStyle = theme.bgGradient(ctx, canvas.width, canvas.height);
  ctx.fillStyle = bgStyle;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw 4 sample balloons with different hues
  const hues = [0, 90, 200, 315];
  const startX = 30;
  const spacing = 60;
  
  hues.forEach((hue, i) => {
    const x = startX + i * spacing;
    const y = 30;
    const r = 15;
    
    // Create balloon object
    const balloon = { x, y, r, hue };
    
    // Draw based on theme shape
    drawThemeBalloonPreviewShape(ctx, balloon, theme);
  });
  
  previewEl.innerHTML = '';
  previewEl.appendChild(canvas);
}

function drawThemeBalloonPreviewShape(ctx, b, theme) {
  const shape = theme.targetShape;
  
  // Draw string for non-pebble shapes
  if (shape !== 'pebble') {
    ctx.strokeStyle = theme.stringColor;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y + b.r + 3);
    ctx.lineTo(b.x, b.y + b.r + 8);
    ctx.stroke();
  }
  
  if (shape === 'petal') {
    // Petal shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r, b.r * 1.3, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (shape === 'bubble') {
    // Bubble - thin outline
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else if (shape === 'star') {
    // Star shape
    const points = 5;
    const outerRadius = b.r;
    const innerRadius = b.r * 0.4;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const radius = i % 2 === 0 ? outerRadius : innerRadius;
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const x = b.x + radius * Math.cos(angle);
      const y = b.y + radius * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'crystal') {
    // Crystal/hexagon shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI) / 3;
      const x = b.x + b.r * Math.cos(angle);
      const y = b.y + b.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'square') {
    // Square shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.fillRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2);
  } else if (shape === 'pebble') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r * 1.1, b.r * 0.82, Math.PI / 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1.5; ctx.stroke();
  } else if (shape === 'vinyl') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
    for (let ring of [0.35, 0.55, 0.75, 0.9]) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * ring, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(20,5,5,0.7)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.12, 0, Math.PI * 2); ctx.fill();
  } else if (shape === 'paper') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r, b.y);
    ctx.lineTo(b.x, b.y + b.r); ctx.lineTo(b.x - b.r, b.y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x - b.r, b.y); ctx.lineTo(b.x + b.r, b.y); ctx.stroke();
  } else if (shape === 'leaf') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.bezierCurveTo(b.x + b.r * 0.9, b.y - b.r * 0.5, b.x + b.r * 0.9, b.y + b.r * 0.5, b.x, b.y + b.r);
    ctx.bezierCurveTo(b.x - b.r * 0.9, b.y + b.r * 0.5, b.x - b.r * 0.9, b.y - b.r * 0.5, b.x, b.y - b.r);
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,80,20,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
  } else if (shape === 'wireframe') {
    const sides = 5;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i * 2 * Math.PI) / sides - Math.PI / 2;
      const px = b.x + b.r * Math.cos(angle), py = b.y + b.r * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 8;
    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  } else if (shape === 'drop') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.bezierCurveTo(b.x + b.r, b.y - b.r * 0.3, b.x + b.r * 0.8, b.y + b.r * 0.5, b.x, b.y + b.r);
    ctx.bezierCurveTo(b.x - b.r * 0.8, b.y + b.r * 0.5, b.x - b.r, b.y - b.r * 0.3, b.x, b.y - b.r);
    ctx.fill();
  } else if (shape === 'cloud') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    [[0, -0.08, 0.62], [-0.42, 0.1, 0.42], [0.42, 0.1, 0.42], [0, 0.48, 0.38]].forEach(([dx, dy, dr]) => {
      ctx.beginPath();
      ctx.arc(b.x + dx * b.r, b.y + dy * b.r, dr * b.r, 0, Math.PI * 2);
      ctx.fill();
    });
  } else if (shape === 'gem') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.lineTo(b.x + b.r, b.y - b.r * 0.15);
    ctx.lineTo(b.x + b.r * 0.55, b.y + b.r);
    ctx.lineTo(b.x - b.r * 0.55, b.y + b.r);
    ctx.lineTo(b.x - b.r, b.y - b.r * 0.15);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(220,180,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  } else if (shape === 'cog') {
    const teeth = 8; const innerR = b.r * 0.62;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < teeth * 2; i++) {
      const angle = (i * Math.PI) / teeth;
      const radius = i % 2 === 0 ? b.r : innerR;
      const px = b.x + radius * Math.cos(angle), py = b.y + radius * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(20,10,0,0.45)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.28, 0, Math.PI * 2); ctx.fill();
  } else if (shape === 'seaglass') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r * 0.88, b.r * 1.1, Math.PI / 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 2; ctx.stroke();
  } else {
    // Default circle
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- SMART REFLOW LOGIC (MODIFIED FOR OFFSET LAYOUT) ---
function reflowBalloons() {
  const spacing = 50;
  const vSpacing = 55; // Slightly more vertical space for tails
  const sideMargin = 40;
  const cols = Math.max(1, Math.floor((width - (sideMargin * 2)) / spacing));
  
  const startX = (width - (cols * spacing)) / 2;
  const startY = 60;

  balloons.forEach((b, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    
    // Offset every other row (brick/honeycomb layout)
    const rowOffset = (row % 2 === 0) ? 0 : (spacing / 2);
    
    // Maintain the random jitter from spawn
    b.x = startX + col * spacing + rowOffset + (spacing/2) + b.jitterX;
    b.y = startY + row * vSpacing;
  });
}

function spawnBalloons() {
  const safeHeight = height * 0.55; 
  const spacing = 50; 
  const vSpacing = 55;
  
  let rows = Math.floor(safeHeight / vSpacing);
  rows = Math.max(3, Math.min(7, rows));
  
  const sideMargin = 40; 
  const cols = Math.floor((width - (sideMargin * 2)) / spacing);
  const startX = (width - (cols * spacing)) / 2;
  const startY = 60; 

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.9) continue; 
      
      // Offset every other row
      const rowOffset = (r % 2 === 0) ? 0 : (spacing / 2);
      
      // Add random jitter so columns aren't straight lines
      const jitterX = (Math.random() * 14) - 7;
      
      balloons.push({
        x: startX + c * spacing + rowOffset + (spacing/2) + jitterX,
        y: startY + r * vSpacing,
        jitterX: jitterX, // Store jitter for resize reflow
        r: 22,
        hue: Math.floor(Math.random() * 360),
        active: true,
        vx: (Math.random() - 0.5) * CONFIG.balloonSpeed,
        vy: (Math.random() - 0.5) * CONFIG.balloonSpeed
      });
    }
  }
  if(balloons.length === 0) balloons.push({x: width/2, y: 100, jitterX:0, r: 22, hue: 0, active:true, vx:0, vy:0});
  
  totalBalloons = balloons.length;
  activeCount = balloons.length;
}

function resetDartPos() {
  dart.x = Math.min(100, width * 0.15); 
  dart.y = height - 50; 
  dart.vx = 0; dart.vy = 0;
  dart.angle = -Math.PI / 4;
  dart.state = 'idle';
  resetBtn.style.display = 'none'; 
}

function showGameOver() {

  if(navigator.vibrate) navigator.vibrate([50, 50, 50]);

// --- INPUT ---
function getPoint(e) {
  const r = canvas.getBoundingClientRect();
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]);
  return { x: (t ? t.clientX : e.clientX) - r.left, y: (t ? t.clientY : e.clientY) - r.top };
}

function inputStart(e) {
  if(e.target === restartIconBtn || e.target === muteBtn || e.target === resetBtn || e.target === menuBtn ||
     muteBtn.contains(e.target) || restartIconBtn.contains(e.target) || menuBtn.contains(e.target)) return;
     
  if (!gameRunning || dart.state !== 'idle') return;
  if(e.cancelable) e.preventDefault();
  input.active = true;
  const p = getPoint(e);
  input.startX = p.x; input.startY = p.y;
  input.currX = p.x; input.currY = p.y;
  input.time = Date.now();
}

function inputMove(e) {
  if (!input.active) return;
  if(e.cancelable) e.preventDefault();
  const p = getPoint(e);
  input.currX = p.x; input.currY = p.y;
}

function inputEnd(e) {
  if (!input.active) return;
  if(e.cancelable) e.preventDefault();
  input.active = false;
  
  const dt = Date.now() - input.time;
  const dx = input.currX - input.startX;
  const dy = input.currY - input.startY;
  
  if (dt < 30 || Math.hypot(dx, dy) < 15) return;

  throwCount++;
  throwsEl.innerText = throwCount;

  let vx = dx / dt * 25 * CONFIG.forceMulti;
  let vy = dy / dt * 25 * CONFIG.forceMulti;
  if (vx > 0 && vy > -5) vy -= 5;

  const speed = Math.hypot(vx, vy);
  if (speed > CONFIG.maxSpeed) {
    const r = CONFIG.maxSpeed / speed;
    vx *= r; vy *= r;
  }
  dart.vx = vx; dart.vy = vy;
  dart.state = 'flying';
  Sound.throw();
}

['mousedown','touchstart'].forEach(ev => canvas.addEventListener(ev, inputStart, {passive:false}));
['mousemove','touchmove'].forEach(ev => window.addEventListener(ev, inputMove, {passive:false}));
['mouseup','touchend'].forEach(ev => window.addEventListener(ev, inputEnd, {passive:false}));

// --- GAME LOGIC ---
function update(dt) {
  if (dart.state === 'flying') {
    dart.x += dart.vx * dt; 
    dart.y += dart.vy * dt;
    dart.vy += CONFIG.gravity * dt;
    dart.vx *= Math.pow(CONFIG.drag, dt); 
    dart.vy *= Math.pow(CONFIG.drag, dt);
    dart.angle = Math.atan2(dart.vy, dart.vx);

    if(Math.abs(dart.vx) < 0.1 && Math.abs(dart.vy) < 0.1) {
        dart.state = 'stuck'; 
        resetBtn.style.display = 'block'; 
    }

    if (dart.x < -50 || dart.x > width + 50 || dart.y > height + 50) {
      dart.state = 'landed';
      setTimeout(resetDartPos, 200);
    }

    const tipX = dart.x + Math.cos(dart.angle) * 20;
    const tipY = dart.y + Math.sin(dart.angle) * 20;

    for (let b of balloons) {
      if (!b.active) continue;
      const dist = Math.hypot(tipX - b.x, tipY - b.y);
      if (dist < b.r + 7) {
        b.active = false;
        activeCount--;
        createPop(b.x, b.y, b.hue);
        poppedCount++;
        poppedEl.innerText = poppedCount;
        Sound.pop();
        if(navigator.vibrate) navigator.vibrate(15); 
        if(activeCount <= 0) setTimeout(showGameOver, 500); 
      }
    }
  }

  const remainingPct = activeCount / totalBalloons;
  if (remainingPct <= 0.10 && activeCount > 0) {
    for (let b of balloons) {
      if (!b.active) continue;
      b.x += b.vx * dt; 
      b.y += b.vy * dt;
      if (b.x < b.r) { b.x = b.r; b.vx *= -1; }
      if (b.x > width - b.r) { b.x = width - b.r; b.vx *= -1; }
      if (b.y < b.r) { b.y = b.r; b.vy *= -1; }
      if (b.y > height - b.r) { b.y = height - b.r; b.vy *= -1; }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.15 * dt; p.life -= 0.02 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function createPop(x, y, hue) {
  const theme = THEMES[currentTheme];
  const particleType = theme.particles || 'default';
  
  let particleCount = 12;
  if (particleType === 'none') particleCount = 0;
  else if (particleType === 'ripple') particleCount = 8;
  else if (particleType === 'shatter') particleCount = 16;
  
  for (let i = 0; i < particleCount; i++) {
    let s;
    if (particleType === 'ripple') {
      s = 1 + i * 0.5; // Slow expanding ripples
    } else {
      s = Math.random() * 5 + 2;
    }
    
    particles.push({
      x: x, y: y,
      vx: Math.cos(Math.random() * 6.28) * s, 
      vy: Math.sin(Math.random() * 6.28) * s,
      hue: hue, 
      life: 1.0,
      type: particleType
    });
  }
}

function drawBalloon(b) {
  const theme = THEMES[currentTheme];
  const shape = theme.targetShape;
  
  // Draw Tail/String (only for real balloons)
  if (shape === 'circle') {
    ctx.strokeStyle = theme.stringColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y + b.r + 6);
    ctx.bezierCurveTo(
      b.x + 8, b.y + b.r + 15,
      b.x - 8, b.y + b.r + 35,
      b.x, b.y + b.r + 48
    );
    ctx.stroke();
  }

  // Draw based on shape
  if (shape === 'petal') {
    // Petal shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r, b.r * 1.3, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (shape === 'bubble') {
    // Bubble - thin outline
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (shape === 'star') {
    // Star shape
    const points = 5;
    const outerRadius = b.r;
    const innerRadius = b.r * 0.4;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const radius = i % 2 === 0 ? outerRadius : innerRadius;
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const x = b.x + radius * Math.cos(angle);
      const y = b.y + radius * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'crystal') {
    // Crystal/hexagon shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI) / 3;
      const x = b.x + b.r * Math.cos(angle);
      const y = b.y + b.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'square') {
    // Square shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.fillRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2);
  } else if (shape === 'pebble') {
    // River stone - smooth organic oval
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r * 1.1, b.r * 0.82, Math.PI / 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else if (shape === 'vinyl') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
    for (let ring of [0.35, 0.55, 0.75, 0.9]) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * ring, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(20,5,5,0.7)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(212,160,23,0.5)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.33, 0, Math.PI * 2); ctx.fill();
  } else if (shape === 'paper') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r, b.y);
    ctx.lineTo(b.x, b.y + b.r); ctx.lineTo(b.x - b.r, b.y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x - b.r, b.y); ctx.lineTo(b.x + b.r, b.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r * 0.5, b.y + b.r * 0.5); ctx.stroke();
  } else if (shape === 'leaf') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.bezierCurveTo(b.x + b.r * 0.9, b.y - b.r * 0.5, b.x + b.r * 0.9, b.y + b.r * 0.5, b.x, b.y + b.r);
    ctx.bezierCurveTo(b.x - b.r * 0.9, b.y + b.r * 0.5, b.x - b.r * 0.9, b.y - b.r * 0.5, b.x, b.y - b.r);
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,80,20,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x + b.r * 0.6, b.y - b.r * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - b.r * 0.6, b.y - b.r * 0.3); ctx.stroke();
  } else if (shape === 'wireframe') {
    const sides = 5;
    ctx.save();
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i * 2 * Math.PI) / sides - Math.PI / 2;
      const px = b.x + b.r * Math.cos(angle), py = b.y + b.r * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 10;
    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 6;
    ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i * 2 * Math.PI) / sides - Math.PI / 2;
      const px = b.x + b.r * 0.45 * Math.cos(angle), py = b.y + b.r * 0.45 * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();
    ctx.globalAlpha = 1; ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.restore();
  } else if (shape === 'drop') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.bezierCurveTo(b.x + b.r, b.y - b.r * 0.3, b.x + b.r * 0.8, b.y + b.r * 0.5, b.x, b.y + b.r);
    ctx.bezierCurveTo(b.x - b.r * 0.8, b.y + b.r * 0.5, b.x - b.r, b.y - b.r * 0.3, b.x, b.y - b.r);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,80,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  } else if (shape === 'cloud') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.save();
    ctx.shadowColor = 'rgba(200,220,255,0.4)'; ctx.shadowBlur = 6;
    [[0, -0.08, 0.62], [-0.42, 0.1, 0.42], [0.42, 0.1, 0.42], [0, 0.48, 0.38]].forEach(([dx, dy, dr]) => {
      ctx.beginPath();
      ctx.arc(b.x + dx * b.r, b.y + dy * b.r, dr * b.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.shadowBlur = 0; ctx.restore();
  } else if (shape === 'gem') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.lineTo(b.x + b.r, b.y - b.r * 0.15);
    ctx.lineTo(b.x + b.r * 0.55, b.y + b.r);
    ctx.lineTo(b.x - b.r * 0.55, b.y + b.r);
    ctx.lineTo(b.x - b.r, b.y - b.r * 0.15);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(220,180,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r * 0.55, b.y + b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x - b.r * 0.55, b.y + b.r); ctx.stroke();
  } else if (shape === 'cog') {
    const teeth = 8; const innerR = b.r * 0.62;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < teeth * 2; i++) {
      const angle = (i * Math.PI) / teeth;
      const radius = i % 2 === 0 ? b.r : innerR;
      const px = b.x + radius * Math.cos(angle), py = b.y + radius * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(20,10,0,0.45)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.28, 0, Math.PI * 2); ctx.fill();
  } else if (shape === 'seaglass') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r * 0.88, b.r * 1.1, Math.PI / 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(b.x - 3, b.y - 4, b.r * 0.38, b.r * 0.22, Math.PI / 5 - 0.3, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // Default circle with gradient
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsla(${b.hue}, 90%, 35%, 1)`;
    ctx.beginPath();
    ctx.moveTo(b.x - 4, b.y + b.r - 2);
    ctx.lineTo(b.x + 4, b.y + b.r - 2);
    ctx.lineTo(b.x, b.y + b.r + 6);
    ctx.fill();
  }
}

function drawDartObj(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 8;

  // Flight
  ctx.beginPath();
  ctx.moveTo(-45, -12); ctx.lineTo(-25, 0); ctx.lineTo(-45, 12); ctx.lineTo(-50, 0); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-45, -12); ctx.lineTo(-35, -6); ctx.lineTo(-35, 0); ctx.lineTo(-50, 0); ctx.fill();
  ctx.moveTo(-35, 0); ctx.lineTo(-25, 0); ctx.lineTo(-35, 6); ctx.lineTo(-35, 12); ctx.fill();
  ctx.shadowColor = 'transparent'; 

  // Body
  let bodyGrad = ctx.createLinearGradient(0, -4, 0, 4);
  bodyGrad.addColorStop(0, '#555');   
  bodyGrad.addColorStop(0.3, '#ddd'); 
  bodyGrad.addColorStop(0.7, '#ddd'); 
  bodyGrad.addColorStop(1, '#555');   
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-25, -4, 45, 8, 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1;
  for(let i=0; i<5; i++) {
      ctx.beginPath(); ctx.moveTo(-20 + (i*6), -4); ctx.lineTo(-20 + (i*6), 4); ctx.stroke();
  }
  // Shaft & Tip
  ctx.fillStyle = '#333'; ctx.fillRect(-28, -2, 3, 4);
  ctx.fillStyle = '#eee';
  ctx.beginPath(); ctx.moveTo(20, -2); ctx.lineTo(20, 2); ctx.lineTo(38, 0); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.moveTo(22, -1); ctx.lineTo(32, -0.5); ctx.stroke();
  ctx.restore();
}

function draw() {
  const theme = THEMES[currentTheme];
  
  // Draw background using theme gradient
  ctx.fillStyle = theme.bgGradient(ctx, width, height);
  ctx.fillRect(0, 0, width, height);

  // --- DRAWING OFF-SCREEN INDICATOR ---
  if (dart.state === 'flying' && dart.y < -10) {
     ctx.save();
     ctx.translate(dart.x, 20);
     ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
     ctx.beginPath();
     ctx.moveTo(0, -8);
     ctx.lineTo(8, 6);
     ctx.lineTo(0, 2);
     ctx.lineTo(-8, 6);
     ctx.closePath();
     ctx.fill();
     ctx.restore();
  }

  if (input.active && dart.state === 'idle') {
    ctx.beginPath();
    ctx.moveTo(input.startX, input.startY);
    ctx.lineTo(input.currX, input.currY);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 10]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  for (let b of balloons) { if (b.active) drawBalloon(b); }
  
  // Only draw dart if it is somewhat on screen
  if (dart.y > -50) {
     drawDartObj(dart.x, dart.y, dart.angle);
  }
  
  for (let p of particles) {
    ctx.fillStyle = theme.particleStyle(p);
    
    // Special particle behaviors
    if (p.type === 'ripple') {
      ctx.strokeStyle = theme.particleStyle(p);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 + (1 - p.life) * 10, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

let lastTime = 0;
function loop(timestamp) {
  if(!gameRunning || document.hidden) return;
  if(!lastTime) lastTime = timestamp;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  let speedFactor = deltaTime / 16.67;
  if(speedFactor > 4) speedFactor = 1; 

  update(speedFactor);
  draw();
  requestAnimationFrame(loop);
}
</script>
