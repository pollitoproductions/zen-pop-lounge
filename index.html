<!DOCTYPE html>
<html>
<head>
<title>Zen Pop Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
<style>
  body { 
    margin: 0; padding: 0; 
    background-color: #1a1a1a; 
    overflow: hidden; 
    font-family: 'Segoe UI', sans-serif;
    touch-action: none; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  canvas { display: block; will-change: transform; }

  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
  }

  .hud-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    width: 100%;
  }
  
  .stat-box { 
    text-align: center; 
    pointer-events: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 1px 2px black; }
  .value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 5px; text-shadow: 0 2px 4px black; }

  .icon-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.15); 
    border: 2px solid rgba(0, 0, 0, 0.6); 
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    margin-top: 5px;
    cursor: pointer;
    display: flex; 
    justify-content: center; align-items: center;
    backdrop-filter: blur(2px);
    transition: transform 0.1s, background 0.2s;
    outline: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  
  .icon-btn svg { width: 24px; height: 24px; fill: #fff; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
  .icon-btn:hover { background: rgba(255,255,255,0.3); }
  .icon-btn:active { transform: scale(0.90); }

  @media (max-height: 500px) and (orientation: landscape) {
    .hud-top { padding: 0 20px; top: 10px; }
    .stat-box { align-items: flex-start; }
    .stat-box:last-child { align-items: flex-end; }
    .value { font-size: 20px; }
    .icon-btn { width: 30px; height: 30px; margin-top: 5px; }
    .icon-btn svg { width: 18px; height: 18px; }
  }

  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center;
    pointer-events: auto;
    z-index: 100;
    transition: opacity 0.3s;
    text-align: center;
  }
  
  #overlay h2 { 
    color: #fff; 
    font-family: 'Limelight', cursive;
    font-size: 64px;
    letter-spacing: 2px;
    margin: 0 0 10px 0; 
    text-shadow: 0 0 15px rgba(255, 75, 43, 0.6);
  }
  
  #overlay p { color: #ccc; font-size: 18px; margin: 0 0 30px 0; max-width: 80%; line-height: 1.4; padding: 0 20px; }
  
  .btn {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white; border: none;
    padding: 15px 40px; font-size: 20px;
    border-radius: 50px; font-weight: bold;
    box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
    cursor: pointer; transition: transform 0.1s;
    outline: none;
    font-family: 'Segoe UI', sans-serif;
  }
  .btn:active { transform: scale(0.95); }
  
  .copyright {
    position: absolute; bottom: 20px;
    color: #666; font-size: 12px; font-weight: 400; letter-spacing: 0.5px;
  }

  /* --- CUSTOMIZE MODAL --- */
  #customize-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #customize-modal.open { display: flex; }

  .customize-modal-content {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    width: min(92vw, 360px);
    max-width: min(92vw, 360px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .customize-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .customize-modal-header h3 {
    color: #fff;
    font-family: 'Limelight', cursive;
    font-size: 22px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255, 75, 43, 0.6);
  }

  #close-customize-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #close-customize-btn:hover { background: rgba(255,75,43,0.5); }

  .customize-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
  }

  .customize-body .btn {
    width: 100%;
    margin: 0;
  }

  /* --- SETTINGS MODAL --- */
  #settings-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #settings-modal.open { display: flex; }

  .settings-modal-content {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    width: min(92vw, 420px);
    max-width: min(92vw, 420px);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .settings-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .settings-modal-header h3 {
    color: #fff;
    font-family: 'Limelight', cursive;
    font-size: 22px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255, 75, 43, 0.6);
  }

  #close-settings-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #close-settings-btn:hover { background: rgba(255,75,43,0.5); }

  .settings-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }

  .setting-group {
    margin-bottom: 20px;
  }

  .setting-group label {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
  }

  .setting-group .setting-desc {
    color: #888;
    font-size: 11px;
    margin-bottom: 10px;
  }

  .sensitivity-levels {
    display: flex;
    gap: 6px;
    width: 100%;
  }

  .sensitivity-btn {
    flex: 1;
    padding: 10px 0;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .sensitivity-btn:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.35);
  }
  .sensitivity-btn.active {
    border-color: #ff4b2b;
    background: rgba(255, 75, 43, 0.18);
    box-shadow: 0 0 10px rgba(255, 75, 43, 0.4);
    color: #ff7055;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }

  .toggle-row label {
    margin-bottom: 0;
  }

  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle-switch input {
    opacity: 0;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    margin: 0;
    cursor: pointer;
    z-index: 2;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 24px;
    transition: background 0.2s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle-switch input:checked + .toggle-slider {
    background: rgba(255, 75, 43, 0.6);
  }

  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(20px);
  }

  #reset-btn { 
    display: none; 
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: bold;
    align-self: center;
    cursor: pointer;
    margin-bottom: 20px;
    backdrop-filter: blur(4px);
  }
  #reset-btn:active { background: rgba(255, 255, 255, 0.4); }

  #theme-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #theme-modal.open { display: flex; }

  .theme-modal-content {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    width: min(92vw, 480px);
    max-width: min(92vw, 480px);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .theme-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .theme-modal-header h3 {
    color: #fff;
    font-family: 'Limelight', cursive;
    font-size: 22px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255, 75, 43, 0.6);
    flex: 1; text-align: center;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(255,255,255,0.3); }

  #close-theme-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    line-height: 1;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #close-theme-btn:hover { background: rgba(255,75,43,0.5); }
  #close-theme-btn:active { transform: scale(0.92); }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    overflow-y: auto;
    flex: 1;
  }

  .theme-card {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 7px 6px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 0;
  }

  .theme-card:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.35);
    transform: translateY(-2px);
  }

  .theme-card.active {
    border-color: #ff4b2b;
    background: rgba(255, 75, 43, 0.18);
    box-shadow: 0 0 10px rgba(255, 75, 43, 0.4);
  }

  .theme-card h4 {
    color: #fff;
    margin: 0 0 3px 0;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .theme-card p {
    color: #999;
    margin: 0;
    font-size: 10px;
    line-height: 1.3;
  }

  .theme-card p.selected-label {
    color: #ff4b2b;
    font-weight: bold;
    margin-top: 3px;
  }

  .theme-preview {
    width: 100%;
    height: 48px;
    border-radius: 6px;
    margin-bottom: 5px;
    border: 1px solid rgba(255,255,255,0.15);
    overflow: hidden;
  }

  #menu-confirm {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #menu-confirm-box {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    min-width: 220px;
  }

  #menu-confirm-box p {
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    margin: 0 0 20px 0;
  }

  #menu-confirm-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  #menu-confirm-yes {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #menu-confirm-yes:active { transform: scale(0.95); }

  #menu-confirm-no {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #menu-confirm-no:active { transform: scale(0.95); }

  /* --- SOUND PICKER MODAL --- */
  #sound-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #sound-modal.open { display: flex; }

  .sound-modal-content {
    background: rgba(20,20,30,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    width: min(92vw, 460px);
    max-width: min(92vw, 460px);
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .sound-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .sound-modal-header h3 {
    color: #fff;
    font-family: 'Limelight', cursive;
    font-size: 20px;
    margin: 0;
    text-shadow: 0 0 10px rgba(255, 75, 43, 0.6);
    flex: 1; text-align: center;
  }

  #close-sound-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px; font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #close-sound-btn:hover { background: rgba(255,75,43,0.5); }

  #dart-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #dart-modal.open { display: flex; }

  .sound-category-label {
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 12px 4px;
  }

  .sound-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 8px 10px;
  }

  .sound-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    margin-bottom: 4px;
  }
  .sound-item:hover { background: rgba(255,255,255,0.08); }
  .sound-item.active {
    border-color: #ff4b2b;
    background: rgba(255,75,43,0.15);
  }

  .sound-item-name {
    flex: 1;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
  }
  .sound-item.active .sound-item-name { color: #ff7055; }

  .sound-item-desc {
    color: #777;
    font-size: 10px;
    flex: 2;
    line-height: 1.3;
  }

  .sound-play-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .sound-play-btn:hover { background: rgba(255,75,43,0.4); }

  .dart-item-preview {
    width: 90px;
    height: 36px;
    border-radius: 6px;
    background: #111827;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .dart-item-text {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 2px;
    min-width: 0;
  }
  .dart-item-text .sound-item-name { flex: none; }
  .dart-item-text .sound-item-desc { flex: none; }

</style>
</head>
<body>

<div id="overlay">
  <h2 id="overlay-title">Zen Pop Arcade</h2>
  <p id="overlay-msg">Drag and release anywhere to throw.</p>
  <button class="btn" id="main-btn">TAP TO PLAY</button>
  <button class="btn" id="customize-btn" style="background: linear-gradient(135deg, #667eea, #764ba2); margin-top: 15px; display: inline-flex; align-items: center; gap: 8px;"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white;"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg> CUSTOMIZE</button>
  <button class="btn" id="settings-btn" style="background: linear-gradient(135deg, #a0a0a0, #606060); margin-top: 10px;">SETTINGS</button>
  <div class="copyright">&copy; Pollito Productions 2026</div>
</div>

<div id="menu-confirm" style="display:none;">
  <div id="menu-confirm-box">
    <p>Go to main menu?</p>
    <div id="menu-confirm-btns">
      <button id="menu-confirm-yes">Main Menu</button>
      <button id="menu-confirm-no">Keep Playing</button>
    </div>
  </div>
</div>

<div id="customize-modal">
  <div class="customize-modal-content">
    <div class="customize-modal-header">
      <h3>Customize</h3>
      <button id="close-customize-btn">&#x2715;</button>
    </div>
    <div class="customize-body">
      <button class="btn" id="theme-btn" style="background: linear-gradient(135deg, #667eea, #764ba2);">CHANGE THEME</button>
      <button class="btn" id="sound-btn" style="background: linear-gradient(135deg, #11998e, #38ef7d);">POP SOUND</button>
      <button class="btn" id="dart-btn" style="background: linear-gradient(135deg, #f7971e, #ffd200); color: #222;">DART SKIN</button>
    </div>
  </div>
</div>

<div id="settings-modal">
  <div class="settings-modal-content">
    <div class="settings-modal-header">
      <h3>Settings</h3>
      <button id="close-settings-btn">&#x2715;</button>
    </div>
    <div class="settings-body">
      <div class="setting-group">
        <div class="toggle-row">
          <label>Music</label>
          <div class="toggle-switch">
            <input type="checkbox" id="music-toggle" checked>
            <span class="toggle-slider"></span>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="toggle-row">
          <label>Pop Sounds</label>
          <div class="toggle-switch">
            <input type="checkbox" id="pop-toggle" checked>
            <span class="toggle-slider"></span>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="toggle-row">
          <label>Vibration</label>
          <div class="toggle-switch">
            <input type="checkbox" id="vibration-toggle" checked>
            <span class="toggle-slider"></span>
          </div>
        </div>
      </div>
      <div class="setting-group">

<script>
// --- AUDIO SYSTEM ---
const Sound = {
  ctx: null,
  masterGain: null,
  muted: false,
  musicMuted: false,
  popMuted: false,
  musicInterval: null,
  
  init: function() {
    window.AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!this.ctx) {
      this.ctx = new AudioContext();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 1.0;
      this.masterGain.connect(this.ctx.destination);
    }
    if(this.ctx.state === 'suspended') {
      return this.ctx.resume();
    }
    return Promise.resolve();
  },
  
  killAudio: function() {
    if(this.masterGain) {
        this.masterGain.gain.cancelScheduledValues(0);
        this.masterGain.gain.value = 0;
    }
    if(this.ctx) this.ctx.suspend();
    this.stopMusic();
  },

  resumeAudio: function() {
    if(this.ctx) {
        if(this.masterGain) this.masterGain.gain.value = 1.0;
        const startIfNeeded = () => {
          if(!this.muted) this.startLoungeMusic();
        };
        if(this.ctx.state === 'suspended') {
          this.ctx.resume().then(startIfNeeded);
        } else {
          startIfNeeded();
        }
    }
  },

  toggleMute: function() {
    this.muted = !this.muted;
    if(this.muted) this.stopMusic();
    else this.startLoungeMusic();
    return this.muted;
  },

  pop: function() {
    if(!this.ctx || this.muted || this.popMuted) return;
    const key = typeof currentPopSound !== 'undefined' ? currentPopSound : 'balloon';
    if(this.popSounds[key]) { this.popSounds[key](this.ctx, this.masterGain); return; }
    // fallback
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(); osc.stop(t + 0.15);
  },

  popSounds: {
    balloon: function(ctx, master) {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.frequency.setValueAtTime(800, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      osc.connect(gain); gain.connect(master); osc.start(); osc.stop(t + 0.15);
    },
    marimba: function(ctx, master) {
      const t = ctx.currentTime;
      // Fundamental
      const o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.type = 'sine'; o1.frequency.setValueAtTime(880, t); o1.frequency.exponentialRampToValueAtTime(440, t + 0.08);
      g1.gain.setValueAtTime(0.5, t); g1.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      o1.connect(g1); g1.connect(master); o1.start(); o1.stop(t + 0.7);
      // Harmonic
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.type = 'sine'; o2.frequency.setValueAtTime(4400, t);
      g2.gain.setValueAtTime(0.06, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o2.connect(g2); g2.connect(master); o2.start(); o2.stop(t + 0.15);
    },
    boop: function(ctx, master) {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      osc.type = 'square'; osc.frequency.value = 280;
      filt.type = 'lowpass'; filt.frequency.value = 650; filt.Q.value = 1.2;
      gain.gain.setValueAtTime(0.0, t); gain.gain.linearRampToValueAtTime(0.22, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.connect(filt); filt.connect(gain); gain.connect(master); osc.start(); osc.stop(t + 0.25);
    },
    cymbal: function(ctx, master) {
      const t = ctx.currentTime;
      const size = Math.floor(ctx.sampleRate * 0.12);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      src.buffer = buf; filt.type = 'highpass'; filt.frequency.value = 7500;
      gain.gain.setValueAtTime(0.28, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      src.connect(filt); filt.connect(gain); gain.connect(master); src.start();
    },
    piano: function(ctx, master) {
      const t = ctx.currentTime;
      [261.63, 329.63, 392, 493.88].forEach(f => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o.connect(g); g.connect(master); o.start(); o.stop(t + 0.35);
      });
    },
    thock: function(ctx, master) {
      const t = ctx.currentTime;
      const size = Math.floor(ctx.sampleRate * 0.09);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0); let b = 0;
      for(let i = 0; i < size; i++) { const w = Math.random() * 2 - 1; b = (b + 0.02 * w) / 1.02; d[i] = b * 4; }
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      src.buffer = buf; filt.type = 'bandpass'; filt.frequency.value = 220; filt.Q.value = 0.9;
      gain.gain.setValueAtTime(0.9, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      src.connect(filt); filt.connect(gain); gain.connect(master); src.start();
      // click transient
      const o = ctx.createOscillator(), g2 = ctx.createGain();
      o.frequency.setValueAtTime(1200, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.012);
      g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
      o.connect(g2); g2.connect(master); o.start(); o.stop(t + 0.012);
    },
    cork: function(ctx, master) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(190, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.14);
      g.gain.setValueAtTime(0.65, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.connect(g); g.connect(master); o.start(); o.stop(t + 0.22);
      const size = Math.floor(ctx.sampleRate * 0.06);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (size * 0.3));
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gn = ctx.createGain();
      src.buffer = buf; filt.type = 'bandpass'; filt.frequency.value = 300;
      gn.gain.setValueAtTime(0.4, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      src.connect(filt); filt.connect(gn); gn.connect(master); src.start();
    },
    billiard: function(ctx, master) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(2100, t); o.frequency.exponentialRampToValueAtTime(700, t + 0.018);
      g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      o.connect(g); g.connect(master); o.start(); o.stop(t + 0.09);
    },
    bubblewrap: function(ctx, master) {
      const t = ctx.currentTime;
      const size = Math.floor(ctx.sampleRate * 0.045);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (size * 0.18));
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      src.buffer = buf; filt.type = 'bandpass'; filt.frequency.value = 4500; filt.Q.value = 1.5;
      gain.gain.setValueAtTime(0.38, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      src.connect(filt); filt.connect(gain); gain.connect(master); src.start();
    },
    waterdrop: function(ctx, master) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(780, t + 0.08);
      o.frequency.exponentialRampToValueAtTime(350, t + 0.22);
      g.gain.setValueAtTime(0.0, t); g.gain.linearRampToValueAtTime(0.45, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.connect(g); g.connect(master); o.start(); o.stop(t + 0.5);
    },
    bamboo: function(ctx, master) {
      const t = ctx.currentTime;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(480, t + 0.04);
      g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
      o.connect(g); g.connect(master); o.start(); o.stop(t + 0.13);
      const size = Math.floor(ctx.sampleRate * 0.05);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (size * 0.25));
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gn = ctx.createGain();
      src.buffer = buf; filt.type = 'bandpass'; filt.frequency.value = 1200; filt.Q.value = 2;
      gn.gain.value = 0.25;
      src.connect(filt); filt.connect(gn); gn.connect(master); src.start();
    },
    leaf: function(ctx, master) {
      const t = ctx.currentTime;
      const dur = 0.18;
      const size = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) {
        const env = Math.exp(-i / (size * 0.4)) * (0.6 + 0.4 * Math.sin(i * 0.08));
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      src.buffer = buf; filt.type = 'bandpass'; filt.frequency.value = 2800; filt.Q.value = 0.6;
      gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(filt); filt.connect(gain); gain.connect(master); src.start();
    },
    ice: function(ctx, master) {
      const t = ctx.currentTime;
      const size = Math.floor(ctx.sampleRate * 0.06);
      const buf = ctx.createBuffer(1, size, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < size; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i * 60 / size);
      const src = ctx.createBufferSource(), filt = ctx.createBiquadFilter(), gain = ctx.createGain();
      src.buffer = buf; filt.type = 'highpass'; filt.frequency.value = 6000;
      gain.gain.setValueAtTime(0.45, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      src.connect(filt); filt.connect(gain); gain.connect(master); src.start();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(3200, t); o.frequency.exponentialRampToValueAtTime(900, t + 0.06);
      g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.connect(g); g.connect(master); o.start(); o.stop(t + 0.08);
    },
  },
  
  throw: function() {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.linearRampToValueAtTime(300, t + 0.2);
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.1);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.3);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(t + 0.3);
  },
  
  win: function() {
    if(!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.setValueAtTime(600, t + 0.1);
    osc.frequency.setValueAtTime(800, t + 0.2);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.5);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(t + 0.5);
  },

  playChord: function(freqs, duration) {
    if(!this.ctx || this.muted || this.musicMuted) return;
    const t = this.ctx.currentTime;
    freqs.forEach((f, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f + (Math.random() * 2 - 1); 
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.12 - (i*0.015), t + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(t + duration + 0.1);
    });
  },

  playBrownNoise: function() {
    if (!this.ctx || this.muted || this.musicMuted) return;
    this.stopBrownNoise();
    const bufferSize = this.ctx.sampleRate * 4;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5;
    }
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600;
    const gainNode = this.ctx.createGain();
    gainNode.gain.value = 0.30;
    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(this.masterGain);
    source.start();
    this.brownNoiseSource = source;
  },

  stopBrownNoise: function() {
    if (this.brownNoiseSource) {
      try { this.brownNoiseSource.stop(); } catch(e) {}
      this.brownNoiseSource = null;
    }
  },

      midnight:       [[311.13,369.99,466.16,554.37],[277.18,329.63,415.30,493.88],[233.08,277.18,369.99,466.16],[311.13,369.99,440.00,554.37]],

  startLoungeMusic: function() {
    if(this.musicInterval) clearInterval(this.musicInterval);
    this.stopBrownNoise();
    if(this.muted || this.musicMuted) return;
    // Riverstone uses brown noise instead of chord music
    if (currentTheme === 'riverstone') {
      this.playBrownNoise();
      return;
    }
    let step = 0;
    const progression = this.getThemeMusic();
    const playStep = () => {
        this.playChord(progression[step % 4], 2.5);
        step++;
    };
    const beginMusic = () => {
      playStep();
      this.musicInterval = setInterval(playStep, 2500);
    };
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume().then(beginMusic);
    } else {
      beginMusic();
    }
  },
  
  stopMusic: function() {
    if(this.musicInterval) clearInterval(this.musicInterval);
    this.musicInterval = null;
    this.stopBrownNoise();
  }
};

function initThemeSelector() {
  const html = Object.entries(THEMES).map(([key, theme]) => {
    const isActive = key === currentTheme;
    return `
      <div class="theme-card${isActive ? ' active' : ''}" data-theme="${key}">
        <div class="theme-preview" id="preview-${key}"></div>
        <h4>${theme.name}</h4>
        <p>${theme.vibe}</p>
        ${isActive ? '<p class="selected-label">&#x2713; Selected</p>' : ''}
      </div>
    `;
  }).join('');
  themeGrid.innerHTML = html;
  
  // Draw balloon previews for each theme
  Object.keys(THEMES).forEach(themeName => {
    drawThemeBalloonPreview(themeName);
  });
}

function drawThemeBalloonPreview(themeName) {
  const theme = THEMES[themeName];
  const previewEl = document.getElementById(`preview-${themeName}`);
  if (!previewEl) return;
  
  const canvas = document.createElement('canvas');
  canvas.width = 280;
  canvas.height = 48;
  const ctx = canvas.getContext('2d');
  
  // Draw background
  const bgStyle = theme.bgGradient(ctx, canvas.width, canvas.height);
  ctx.fillStyle = bgStyle;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 4 shapes across
  const hues = [0, 90, 200, 315];
  const positions = [
    { x: 50,  y: 18 },
    { x: 120, y: 18 },
    { x: 190, y: 18 },
    { x: 260, y: 18 },
  ];
  const r = 14;

  hues.forEach((hue, i) => {
    const balloon = { x: positions[i].x, y: positions[i].y, r, hue };
    drawThemeBalloonPreviewShape(ctx, balloon, theme);
  });
  
  previewEl.innerHTML = '';
  canvas.style.width = '100%';
  canvas.style.height = 'auto';
  previewEl.appendChild(canvas);
}

function drawThemeBalloonPreviewShape(ctx, b, theme) {
  const shape = theme.targetShape;
  
  // Draw string for non-pebble shapes
  if (shape !== 'pebble') {
    ctx.strokeStyle = theme.stringColor;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y + b.r + 3);
    ctx.lineTo(b.x, b.y + b.r + 8);
    ctx.stroke();
  }
  
  if (shape === 'petal') {
    // Petal shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r, b.r * 1.3, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (shape === 'bubble') {
    // Bubble - thin outline
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else if (shape === 'star') {
    // Star shape
    const points = 5;
    const outerRadius = b.r;
    const innerRadius = b.r * 0.4;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const radius = i % 2 === 0 ? outerRadius : innerRadius;
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const x = b.x + radius * Math.cos(angle);
      const y = b.y + radius * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'icecube') {
    // Ice cube shape — rounded square with highlights
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath(); ctx.roundRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2, 4); ctx.fill();
    // Frosted edge highlight (top-left)
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(b.x - b.r + 4, b.y - b.r); ctx.lineTo(b.x + b.r - 4, b.y - b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x - b.r, b.y - b.r + 4); ctx.lineTo(b.x - b.r, b.y + b.r - 4); ctx.stroke();
    // Internal crack/facet lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(b.x - b.r * 0.5, b.y - b.r * 0.6); ctx.lineTo(b.x + b.r * 0.2, b.y + b.r * 0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x + b.r * 0.3, b.y - b.r * 0.4); ctx.lineTo(b.x - b.r * 0.1, b.y + b.r * 0.6); ctx.stroke();
  } else if (shape === 'crystal') {
    // Crystal/hexagon shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI) / 3;
      const x = b.x + b.r * Math.cos(angle);
      const y = b.y + b.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  } else if (shape === 'square') {
    // Square shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.fillRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2);
  } else if (shape === 'pebble') {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r * 1.1, b.r * 0.82, Math.PI / 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; ctx.stroke();
    // Stone highlight
    ctx.save();
    ctx.globalAlpha = 0.18;
    const stg = ctx.createRadialGradient(b.x - b.r * 0.2, b.y - b.r * 0.2, 0, b.x, b.y, b.r * 0.9);
    stg.addColorStop(0, '#fff'); stg.addColorStop(1, 'transparent');
    ctx.fillStyle = stg;
    ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r * 0.8, b.r * 0.6, Math.PI / 7, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else if (shape === 'vinyl') {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // Grooves
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.6;
    for (let ring of [0.35, 0.55, 0.75, 0.9]) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * ring, 0, Math.PI * 2); ctx.stroke();
    }
    // Label area
    ctx.fillStyle = 'rgba(212,160,23,0.45)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.3, 0, Math.PI * 2); ctx.fill();
    // Center hole
    ctx.fillStyle = 'rgba(10,5,5,0.8)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.08, 0, Math.PI * 2); ctx.fill();
    // Vinyl shine
    ctx.save();
    ctx.globalAlpha = 0.08;
    const vg = ctx.createLinearGradient(b.x - b.r, b.y - b.r, b.x + b.r, b.y + b.r);
    vg.addColorStop(0, 'transparent'); vg.addColorStop(0.4, '#fff'); vg.addColorStop(0.6, '#fff'); vg.addColorStop(1, 'transparent');
    ctx.fillStyle = vg;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else if (shape === 'paper') {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.12)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r, b.y);
    ctx.lineTo(b.x, b.y + b.r); ctx.lineTo(b.x - b.r, b.y);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // Fold creases
    ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x - b.r, b.y); ctx.lineTo(b.x + b.r, b.y); ctx.stroke();
    // Paper highlight
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x + b.r, b.y);
    ctx.lineTo(b.x, b.y); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (shape === 'maple') {
    // Maple leaf shape
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    const r = b.r;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - r);                          // top tip
    ctx.lineTo(b.x + r*0.15, b.y - r*0.55);
    ctx.lineTo(b.x + r*0.7, b.y - r*0.65);             // upper-right lobe
    ctx.lineTo(b.x + r*0.45, b.y - r*0.3);
    ctx.lineTo(b.x + r*0.95, b.y - r*0.1);             // right lobe
    ctx.lineTo(b.x + r*0.55, b.y + r*0.1);
    ctx.lineTo(b.x + r*0.6, b.y + r*0.55);             // lower-right lobe
    ctx.lineTo(b.x + r*0.25, b.y + r*0.45);
    ctx.lineTo(b.x + r*0.1, b.y + r*0.9);              // bottom-right
    ctx.lineTo(b.x, b.y + r*0.6);                       // bottom center notch
    ctx.lineTo(b.x - r*0.1, b.y + r*0.9);              // bottom-left
    ctx.lineTo(b.x - r*0.25, b.y + r*0.45);
    ctx.lineTo(b.x - r*0.6, b.y + r*0.55);             // lower-left lobe
    ctx.lineTo(b.x - r*0.55, b.y + r*0.1);
    ctx.lineTo(b.x - r*0.95, b.y - r*0.1);             // left lobe
    ctx.lineTo(b.x - r*0.45, b.y - r*0.3);
    ctx.lineTo(b.x - r*0.7, b.y - r*0.65);             // upper-left lobe
    ctx.lineTo(b.x - r*0.15, b.y - r*0.55);
    ctx.closePath();
    ctx.fill();
    // Stem
    ctx.strokeStyle = 'rgba(100,50,10,0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(b.x, b.y + r*0.6); ctx.lineTo(b.x, b.y + r*1.1); ctx.stroke();
  } else if (shape === 'leaf') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.bezierCurveTo(b.x + b.r * 0.9, b.y - b.r * 0.5, b.x + b.r * 0.9, b.y + b.r * 0.5, b.x, b.y + b.r);
    ctx.bezierCurveTo(b.x - b.r * 0.9, b.y + b.r * 0.5, b.x - b.r * 0.9, b.y - b.r * 0.5, b.x, b.y - b.r);
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,80,20,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r); ctx.stroke();
  } else if (shape === 'wireframe') {
    const sides = 5;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i * 2 * Math.PI) / sides - Math.PI / 2;
      const px = b.x + b.r * Math.cos(angle), py = b.y + b.r * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 8;
    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  } else if (shape === 'hexagon') {
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI) / 3 - Math.PI / 6;
      const x = b.x + b.r * Math.cos(angle);
      const y = b.y + b.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

  } else if (shape === 'drop') {

    ctx.fillStyle = 'rgba(0,0,0,0.6)';

  } else {

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
    ctx.fillStyle = theme.balloonStyle(b, ctx);
    ctx.beginPath();

    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

  const style = typeof currentDartStyle !== 'undefined' ? currentDartStyle : 'pub';
  if (DART_DRAW[style]) { DART_DRAW[style](ctx, x, y, angle); return; }
  DART_DRAW.pub(ctx, x, y, angle);
}

      ctx.save();
      const pg = ctx.createRadialGradient(px - 1, py - 1, 0, px, py, rx);
      pg.addColorStop(0, '#fff0f3'); pg.addColorStop(0.5, '#ffb6c8'); pg.addColorStop(1, '#e88aa0');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.ellipse(px, py, rx, ry, rot, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });
    // Tip thorn
    ctx.fillStyle = '#4a2e14'; ctx.beginPath(); ctx.moveTo(22, -1.5); ctx.lineTo(22, 1.5); ctx.lineTo(38, 0); ctx.closePath(); ctx.fill();
    ctx.restore();
  },

  pen: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    // Ink trail with gradient fade
    for(let i = 1; i <= 6; i++) {
      ctx.globalAlpha = 0.08 * (7 - i);
      const ig = ctx.createRadialGradient(-22 - i*7, 0, 0, -22 - i*7, 0, 5 - i*0.5);
      ig.addColorStop(0, '#1a1a4a'); ig.addColorStop(1, 'transparent');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.ellipse(-22 - i*7, 0, 5 - i*0.5, 3 - i*0.3, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
    // Pen body — lacquer finish
    let pg = ctx.createLinearGradient(0, -5, 0, 5);
    pg.addColorStop(0, '#0d0820'); pg.addColorStop(0.3, '#2a1e58'); pg.addColorStop(0.5, '#4a3888'); pg.addColorStop(0.7, '#2a1e58'); pg.addColorStop(1, '#0d0820');
    ctx.fillStyle = pg; ctx.beginPath(); ctx.roundRect(-27, -4.5, 50, 9, 3); ctx.fill();
    ctx.shadowColor = 'transparent';
    // Gold bands
    let gb = ctx.createLinearGradient(0, -5, 0, 5);
    gb.addColorStop(0, '#8a6a00'); gb.addColorStop(0.3, '#f0c840'); gb.addColorStop(0.5, '#ffe870'); gb.addColorStop(0.7, '#f0c840'); gb.addColorStop(1, '#8a6a00');
    ctx.fillStyle = gb;
    ctx.beginPath(); ctx.roundRect(-28, -5, 7, 10, 1.5); ctx.fill();
    ctx.beginPath(); ctx.roundRect(14, -5, 7, 10, 1.5); ctx.fill();
    // Gold nib
    let ng = ctx.createLinearGradient(0, -3.5, 0, 3.5);
    ng.addColorStop(0, '#7a5800'); ng.addColorStop(0.3, '#e8b830'); ng.addColorStop(0.5, '#ffe060'); ng.addColorStop(0.7, '#e8b830'); ng.addColorStop(1, '#7a5800');
    ctx.fillStyle = ng; ctx.beginPath(); ctx.moveTo(22, -3.5); ctx.lineTo(22, 3.5); ctx.lineTo(42, 0); ctx.closePath(); ctx.fill();
    // Nib slit
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(24, 0); ctx.lineTo(40, 0); ctx.stroke();
    // Body shine
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(-24, -3); ctx.lineTo(14, -3); ctx.stroke();
    ctx.restore();
  },

  paper: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 3;
    // Paper body
    ctx.fillStyle = '#f8f8f0';
    ctx.beginPath();
    ctx.moveTo(35, 0); ctx.lineTo(12, -11); ctx.lineTo(-32, -6); ctx.lineTo(-32, 6); ctx.lineTo(12, 11); ctx.closePath();
    ctx.fill();
    ctx.shadowColor = 'transparent';
    // Subtle paper texture gradient
    ctx.save(); ctx.globalAlpha = 0.08;
    let tg = ctx.createLinearGradient(-32, -6, 35, 6);
    tg.addColorStop(0, '#ddd'); tg.addColorStop(0.5, 'transparent'); tg.addColorStop(1, '#ccc');
    ctx.fillStyle = tg;
    ctx.beginPath();
    ctx.moveTo(35, 0); ctx.lineTo(12, -11); ctx.lineTo(-32, -6); ctx.lineTo(-32, 6); ctx.lineTo(12, 11); ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Thin outline
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.6; ctx.stroke();
    // Fold lines
    ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-32, 0); ctx.lineTo(35, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -11); ctx.lineTo(12, 11); ctx.stroke();
    // Top wing highlight
    ctx.save(); ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(12, -11); ctx.lineTo(35, 0); ctx.lineTo(12, 0); ctx.lineTo(-32, -6); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.restore();
  },

  spoon: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 3;
    // Handle
    let sg = ctx.createLinearGradient(0, -4, 0, 4);
    sg.addColorStop(0, '#777'); sg.addColorStop(0.2, '#ccc'); sg.addColorStop(0.4, '#f0f0f0'); sg.addColorStop(0.6, '#f0f0f0'); sg.addColorStop(0.8, '#ccc'); sg.addColorStop(1, '#777');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.roundRect(-30, -3, 50, 6, 2); ctx.fill();
    ctx.shadowColor = 'transparent';
    // Bowl with depth
    let bg = ctx.createRadialGradient(27, -2, 1, 27, 0, 9);
    bg.addColorStop(0, '#fff'); bg.addColorStop(0.3, '#e8e8e8'); bg.addColorStop(0.7, '#bbb'); bg.addColorStop(1, '#888');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(28, 0, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.8; ctx.stroke();
    // Handle end knob
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(-28, 0, 5.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    // Highlight streak
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-24, -1.5); ctx.lineTo(20, -1.5); ctx.stroke();
    ctx.restore();
  },

  prism: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    // Rainbow dispersion trail
    const rainbow = [
      ['rgba(255,30,30,0.3)', 3.5], ['rgba(255,140,0,0.25)', 2],
      ['rgba(255,255,0,0.25)', 0.5], ['rgba(0,220,0,0.25)', -1],
      ['rgba(0,80,255,0.25)', -2.5], ['rgba(140,0,255,0.25)', -4]
    ];
    rainbow.forEach(([c, yOff], i) => {
      ctx.fillStyle = c;
      for(let j = 1; j <= 3; j++) {
        ctx.beginPath(); ctx.ellipse(-22 - i*5 - j*4, yOff*(1+j*0.3), 5 - j*0.8, 2.5 - j*0.4, 0, 0, Math.PI*2); ctx.fill();
      }
    });
    // Prism body — glass effect
    ctx.shadowColor = 'rgba(200,220,255,0.3)'; ctx.shadowBlur = 8;
    let prg = ctx.createLinearGradient(0, -16, 0, 16);
    prg.addColorStop(0, 'rgba(200,240,255,0.92)'); prg.addColorStop(0.3, 'rgba(255,255,255,0.96)');
    prg.addColorStop(0.7, 'rgba(255,255,255,0.96)'); prg.addColorStop(1, 'rgba(220,200,255,0.92)');
    ctx.fillStyle = prg;
    ctx.beginPath(); ctx.moveTo(30, 0); ctx.lineTo(-10, -15); ctx.lineTo(-22, 0); ctx.lineTo(-10, 15); ctx.closePath(); ctx.fill();
    ctx.shadowColor = 'transparent';
    // Glass edges
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1; ctx.stroke();
    // Internal refraction line
    ctx.strokeStyle = 'rgba(200,220,255,0.3)'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-10, 15); ctx.stroke();
    ctx.restore();
  },

  frost: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    // Icy mist trail
    for(let i = 1; i <= 6; i++) {
      ctx.globalAlpha = 0.08 * (7 - i);
      const mg = ctx.createRadialGradient(-14 - i*7, 0, 0, -14 - i*7, 0, 8 - i*0.6);
      mg.addColorStop(0, '#c0f0ff'); mg.addColorStop(1, 'transparent');
      ctx.fillStyle = mg;
      ctx.beginPath(); ctx.ellipse(-14 - i*7, (Math.sin(i * 1.8) * 2), 8 - i*0.6, 4.5 - i*0.4, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = 'rgba(160,230,255,0.3)'; ctx.shadowBlur = 8;
    // Icicle body
    let ig = ctx.createLinearGradient(0, -7, 0, 7);
    ig.addColorStop(0, '#d8f4ff'); ig.addColorStop(0.3, '#ffffff'); ig.addColorStop(0.5, '#e8faff');
    ig.addColorStop(0.7, '#ffffff'); ig.addColorStop(1, '#b0e0f0');
    ctx.fillStyle = ig;
    ctx.beginPath(); ctx.moveTo(36, 0); ctx.lineTo(22, -7); ctx.lineTo(-30, -3.5); ctx.lineTo(-35, 0); ctx.lineTo(-30, 3.5); ctx.lineTo(22, 7); ctx.closePath(); ctx.fill();
    ctx.shadowColor = 'transparent';
    // Sharp crystalline edges
    ctx.strokeStyle = 'rgba(180,230,255,0.6)'; ctx.lineWidth = 0.8; ctx.stroke();
    // Internal fracture
    ctx.strokeStyle = 'rgba(160,210,240,0.2)'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(-15, -2); ctx.lineTo(5, 1); ctx.lineTo(20, -1); ctx.stroke();
    ctx.restore();
  },

  neon: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    // Outer glow shell
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 18;
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(36, 0); ctx.lineTo(6, -14); ctx.lineTo(-10, 0); ctx.lineTo(6, 14); ctx.closePath(); ctx.stroke();
    // Magenta inner diamond
    ctx.shadowColor = '#f0f'; ctx.shadowBlur = 12;
    ctx.strokeStyle = '#f0f'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(6, -8); ctx.lineTo(-4, 0); ctx.lineTo(6, 8); ctx.closePath(); ctx.stroke();
    // Hot white center
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(10, 0, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.restore();
  },

  star: function(ctx, x, y, angle) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    // Gold dust trail with sparkles
    for(let i = 1; i <= 8; i++) {
      const alpha = 0.15 * (9 - i);
      const r = 4.5 - i * 0.4;
      const sy = Math.sin(i * 1.3) * 6;
      // Glow
      ctx.save();
      ctx.shadowColor = `rgba(255,200,50,${alpha * 0.5})`;
      ctx.shadowBlur = 4;
      ctx.fillStyle = `rgba(255,215,80,${alpha})`;
      ctx.beginPath(); ctx.arc(-10 - i * 7, sy, r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    // Outer glow halo
    const og = ctx.createRadialGradient(8, 0, 0, 8, 0, 24);
    og.addColorStop(0, 'rgba(255,240,180,0.5)'); og.addColorStop(0.5, 'rgba(255,180,30,0.2)'); og.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = og; ctx.beginPath(); ctx.arc(8, 0, 24, 0, Math.PI * 2); ctx.fill();
    // Core glow
    const cg = ctx.createRadialGradient(8, 0, 0, 8, 0, 14);
    cg.addColorStop(0, 'rgba(255,255,240,1)'); cg.addColorStop(0.3, 'rgba(255,220,80,0.95)');
    cg.addColorStop(0.7, 'rgba(255,160,20,0.5)'); cg.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(8, 0, 14, 0, Math.PI * 2); ctx.fill();
    // Bright core dot with cross flare
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(8, 0, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(8, -8); ctx.lineTo(8, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(14, 0); ctx.stroke();
    ctx.restore();
  },
};



let _bgCache = null, _bgCacheTheme = '', _bgCacheW = 0, _bgCacheH = 0;
function draw() {
  const theme = THEMES[currentTheme];
  // Cache background gradient — no need to recreate every frame
  if (!_bgCache || _bgCacheTheme !== currentTheme || _bgCacheW !== width || _bgCacheH !== height) {
    _bgCache = theme.bgGradient(ctx, width, height);
    _bgCacheTheme = currentTheme; _bgCacheW = width; _bgCacheH = height;
  }
  ctx.fillStyle = _bgCache;
  ctx.fillRect(0, 0, width, height);

  // --- DRAWING OFF-SCREEN INDICATOR ---
  if (dart.state === 'flying' && dart.y < -10) {
     ctx.save();
     ctx.translate(dart.x, 20);
     ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
     ctx.beginPath();
     ctx.moveTo(0, -8);
     ctx.lineTo(8, 6);
     ctx.lineTo(0, 2);
     ctx.lineTo(-8, 6);
     ctx.closePath();
     ctx.fill();
     ctx.restore();
  }



  for (let b of balloons) { if (b.active) drawBalloon(b); }
  
  // Only draw dart if it is somewhat on screen
  if (dart.y > -50) {
     drawDartObj(dart.x, dart.y, dart.angle);
  }
  
  for (let p of particles) {
    ctx.fillStyle = theme.particleStyle(p);
    
    // Special particle behaviors
    if (p.type === 'ripple') {
      ctx.strokeStyle = theme.particleStyle(p);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 + (1 - p.life) * 10, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

let lastTime = 0;
function loop(timestamp) {
  if(!gameRunning || document.hidden) return;
  if(!lastTime) lastTime = timestamp;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  let speedFactor = deltaTime / 16.67;
  if(speedFactor > 4) speedFactor = 1; 

  update(speedFactor);
  draw();
  requestAnimationFrame(loop);
}

// --- AD CALLBACKS (called from Android native) ---
function onAdRewarded(data) {
  customizeUnlocked = true;
  updateCustomizeBtn();
  customizeModal.classList.add('open');
}

function onAdClosed(data) {
  if (!customizeUnlocked) {
    adReady = false;
    updateCustomizeBtn();
  }
}

function onAdReady(data) {
  adReady = true;
  updateCustomizeBtn();
}
</script>
